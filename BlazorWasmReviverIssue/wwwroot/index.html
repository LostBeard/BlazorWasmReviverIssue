<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlazorWasmReviverIssue</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="BlazorWasmReviverIssue.styles.css" rel="stylesheet" />
    <script>
        // The below code (when enabled) prevents the exception caused by simply calling hasOwnProperty on some objects like a cross-origin window
        // The real fix should be in the reviver that causes the exception, blazor.webassembly.js, part of the Blazor Wasm framework in aspnetcore
        //
        // When the below patch is disabled (false) the issue can be seen during the test app run
        const enablePatch = false;
        if (enablePatch) {
            const originalHasOwnPropertyPrototype = Object.prototype.hasOwnProperty;
            Object.prototype.hasOwnProperty = function (prop) {
                try {
                    // Attempt the normal engine execution
                    return originalHasOwnPropertyPrototype.apply(this, [prop]);
                } catch (error) {
                    // Catch DOMException / SecurityError (e.g., cross-origin window access)
                    if (error instanceof DOMException || error.name === 'SecurityError') {
                        // Return false so Blazor treats it as a non-existent property
                        return false;
                    }
                    // Re-throw genuine, unrelated engine errors
                    throw error;
                }
            };
        }
    </script>
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
